version: '3.8'

services:
  api:
    build: .
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:///./health.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped